{% extends "layout.html" %}

{% block title%}Register{% endblock %}


{% block body %}
    <div class="centre">
        <div class="sign-in-block shadow-sm">
            <h3 class="mb-1">Welcome!</h3>
            <p class="text-muted mb-5" > Let's create your cooking space</p>

            <form action="/register" method="post">
                <div class="mb-3">
                    <input autocomplete="off" autofocus class="form-control w-100" name="email" placeholder="Email" type="email">
                </div>
                <div class="mb-3">
                    <input class="form-control w-100" name="password" placeholder="Password" type="password" minlength="8">
                </div>
                <div class="mb-4">
                    <input class="form-control w-100" name="confirm" placeholder="Confirm Password" type="password" >
                </div>
                <button class="btn btn-primary w-100 mt-1" type="submit">Register</button>
            </form>
            <p class="text-muted mt-2">Already have an account? <a href="/login">Sign in here</a></p>
        </div>
    </div>
{% endblock %}
