{% extends "layout.html" %}

{% block title%}Settings{% endblock %}


{% block body %}
<div class="card p-4">
    <form action="/settings" method="post">
        <div class="input-group mb-4">
            <div class="form-floating">
                <input autocomplete=off class="form-control" name="api_key" id="apiKey" type="password" placeholder="Groq API Key" {% if api_key %} value="{{ api_key }}" {% endif %}>
                <label for="apiKey">Your Groq API Key</label>
            </div>
            <button class="btn btn-secondary px-3" type="button" id="toggleKeyBtn"><i class="bi bi-eye-fill" id="toggleIcon"></i></button>
        </div>

        {% if not api_key %}
            <div class="alert alert-danger">
                You haven't added a Groq API Key yet.
                <a href="https://console.groq.com" class="alert-link" target="_blank">Get one here for free</a>
                to enable recipe generation.
            </div>
        {% endif %}
        <div class="d-flex justify-content-end gap-2">
            <button class="btn btn-primary" style="min-width: 100px;" type="submit">Save</button>
            <a href="/settings" class="btn btn-outline-secondary" style="min-width: 100px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

{% block script %}
<script>
    const apiKeyInput = document.getElementById('apiKey');
    const toggleKeyBtn = document.getElementById('toggleKeyBtn')

    toggleKeyBtn.addEventListener('click', function () {
        if (apiKeyInput.type === 'password') {
            apiKeyInput.type = 'text';
            toggleKeyBtn.innerHTML = '<i class="bi bi-eye-slash-fill"></i>';
        } else {
            apiKeyInput.type = 'password';
            toggleKeyBtn.innerHTML = '<i class="bi bi-eye-fill"></i>';
        }
    });
</script>
{% endblock %}
