{% extends "layout.html" %}

{% block title%}Recipe{% endblock %}


{% block body %}
<div class="mb-4 text-start">
    <h2 class="fw-bold mb-1">Suggested Recipe</h2>
    <p class="text-muted">Generated from your pantry of ingredients, prioritising ingredients closest to expiry.</p>
</div>

<div class="card shadow border-0 py-4 px-5 text-start">
    <p>{{ recipe|safe }}</p>

    <div class="mt-4 d-flex gap-3" style="justify-content: right;">
        <a href="/recipe" class="btn btn-primary shadow">Generate Another</a>
        <a href="/inventory" class="btn btn-outline-secondary shadow">Back to Pantry</a>
    </div>
</div>

<div style="margin-bottom: 10%;"></div>

{% endblock %}
