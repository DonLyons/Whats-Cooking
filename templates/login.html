{% extends "layout.html" %}

{% block title%}Sign In{% endblock %}


{% block body %}
    <div class="centre">
        <div class="sign-in-block shadow-sm">
            <h3 class="mb-1">Welcome back!</h3>
            <p class="text-muted mb-5"> Sign in to your cooking space</p>

            <form action="/login" method="post">
                <div class="mb-3">
                    <input autocomplete="off" autofocus class="form-control w-100" name="email" placeholder="Email" type="email">
                </div>
                <div class="mb-4">
                    <div class="input-group">
                        <input class="form-control" name="password" id="password" placeholder="Password" type="password">
                        <button class="btn btn-outline-primary px-2" type="button" id="toggleKeyBtn"><i class="bi bi-eye-fill" id="toggleIcon"></i></button>
                    </div>
                </div>
                <button class="btn btn-primary w-100 mt-1" type="submit">Sign In</button>

            </form>
            <p class="text-muted mt-2">Don't have an account? <a href="/register">Register here</a></p>
        </div>
    </div>

{% endblock %}

{% block script %}
<script>
    const passwordInput = document.getElementById('password');
    const toggleKeyBtn = document.getElementById('toggleKeyBtn')

    toggleKeyBtn.addEventListener('click', function () {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleKeyBtn.innerHTML = '<i class="bi bi-eye-slash-fill"></i>';
        } else {
            passwordInput.type = 'password';
            toggleKeyBtn.innerHTML = '<i class="bi bi-eye-fill"></i>';
        }
    });
</script>
{% endblock %}
